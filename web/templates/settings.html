{{define "content"}}
<div class="settings-page">
  <h1>Settings</h1>
  <form id="settings-form">
    <h2>Scanner</h2>
    <div class="form-group">
      <label for="default-threads">Default Threads:</label>
      <input type="number" id="default-threads" value="10">
    </div>
    <div class="form-group">
      <label for="timeout">Timeout (seconds):</label>
      <input type="number" id="timeout" value="10">
    </div>
    
    <h2>Fingerprints</h2>
    <div class="form-group">
      <label for="auto-update">Auto-update fingerprints:</label>
      <input type="checkbox" id="auto-update" checked>
    </div>
    <button type="button" id="update-now">Update Now</button>
    
    <h2>Notifications</h2>
    <div class="form-group">
      <label for="webhook-url">Webhook URL (Slack/Discord):</label>
      <input type="url" id="webhook-url">
    </div>
    <button type="submit">Save Settings</button>
  </form>
</div>
<script src="/static/js/settings.js"></script>
{{end}}
