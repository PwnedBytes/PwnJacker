{{define "content"}}
<div class="scan-page">
    <h1>New Scan</h1>
    <form id="scan-form">
        <div class="form-group">
            <label for="domains">Domains (one per line):</label>
            <textarea id="domains" rows="10" required></textarea>
        </div>
        <div class="form-group">
            <label for="threads">Threads:</label>
            <input type="number" id="threads" value="10" min="1" max="50">
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="check-email"> Check Email (SPF/DKIM/DMARC)</label>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="deep-scan"> Deep Scan (slower)</label>
        </div>
        <button type="submit">Start Scan</button>
    </form>
    <div id="scan-progress" style="display:none;">
        <h2>Scan in Progress</h2>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text"></p>
    </div>
</div>
<script src="/static/js/scan.js"></script>
{{end}}
