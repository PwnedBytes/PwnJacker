    claim_url: "https://app.sendinblue.com"
    remediation: "Recreate the Sendinblue domain or remove DNS"
    severity: "MEDIUM"

  - name: Google Workspace (Gmail)
    cname_patterns:
      - "google.com"
    # Note: Google Workspace takeovers are rare but possible if domain is removed.
    # We'll add a pattern but severity lower.
    http_checks:
      - status: 404
        body_patterns:
          - "Domain not found"
    claim_url: "https://admin.google.com"
    remediation: "Re-add domain to Google Workspace or remove DNS"
    severity: "LOW"

  - name: Office 365 (Microsoft)
