# Email Service Fingerprints
version: 1.0
updated: "2025-01-01"

services:
  - name: Mailgun
    cname_patterns:
      - ".mailgun.org"
    http_checks:
      - status: 404
        body_patterns:
          - "Domain not found"
    claim_url: "https://app.mailgun.com"
    remediation: "Recreate the Mailgun domain or remove the DNS record"
    severity: "HIGH"

  - name: SendGrid
    cname_patterns:
      - ".sendgrid.net"
    http_checks:
      - status: 404
        body_patterns:
          - "The domain you are trying to access is not configured"
    claim_url: "https://app.sendgrid.com"
    remediation: "Reconfigure SendGrid domain or remove the DNS record"
    severity: "HIGH"

  - name: SparkPost
    cname_patterns:
      - ".sparkpostmail.com"
    http_checks:
      - status: 404
        body_patterns:
          - "Domain not found"
    claim_url: "https://app.sparkpost.com"
    remediation: "Recreate the SparkPost domain or remove DNS"
    severity: "HIGH"

  - name: Amazon SES
    cname_patterns:
      - ".amazonses.com"
    http_checks:
      - status: 404
        body_patterns:
          - "Domain does not exist"
    claim_url: "https://console.aws.amazon.com/ses"
    remediation: "Recreate the SES domain identity or remove DNS"
    severity: "HIGH"

  - name: Mailchimp
    cname_patterns:
      - ".mandrillapp.com"
    http_checks:
      - status: 404
        body_patterns:
          - "Domain not found"
    claim_url: "https://mailchimp.com"
    remediation: "Reconfigure Mailchimp domain or remove DNS"
    severity: "MEDIUM"

  - name: Mailjet
    cname_patterns:
